
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1F4B57">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="E.A.R. Car Rental">
    <title>E.A.R. Car Rental Services | Puerto Princesa • El Nido • Palawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Newsreader', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#AFC1CC',  // Color 3 - Light Blue Gray (Background)
                            100: '#7FA9AF', // Color 4 - Soft Desaturated Teal
                            500: '#3A7F88', // Color 2 - Muted Teal
                            800: '#245C85', // Color 5 - Deep Ocean Blue
                            950: '#1F4B57', // Color 1 - Deep Teal (Header/Footer/Text)
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #AFC1CC; }
        ::-webkit-scrollbar-thumb { background: #3A7F88; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1F4B57; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(31, 75, 87, 0.1);
        }
        .glass-nav {
            background: rgba(31, 75, 87, 0.96); /* Deep Teal Background */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .text-glow { text-shadow: 0 0 30px rgba(58, 127, 136, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-neon {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-neon:hover {
            border-color: #3A7F88 !important;
            box-shadow: 0 0 20px rgba(58, 127, 136, 0.3), 0 0 40px rgba(58, 127, 136, 0.1) !important;
            transform: translateY(-1.5px);
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.2) sepia(1) saturate(1) hue-rotate(160deg);
        }
    </style>
<script type="importmap">

}

</html>
